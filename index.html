<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retinal</title>
  <link href="https://fonts.googleapis.com/css2?family=Morganite:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-family: 'Morganite', sans-serif;
      font-weight: 900;
      font-size: clamp(100px, 25vw, 220px);
      line-height: 0.85;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }
    p {
      font-family: 'Morganite', sans-serif;
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #666;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Retinal</h1>
  <p>soon come</p>
</body>
</html>
